plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.ppe_clean"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.ppe_clean"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
    
    // 🔧 Важно для tflite_flutter
    lint {
        disable 'InvalidPackage'
    }
}

flutter {
    source "../.."
}

dependencies {
    // Пусто, но блок должен быть
}